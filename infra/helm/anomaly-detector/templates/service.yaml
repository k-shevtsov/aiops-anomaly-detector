apiVersion: v1
kind: Service
metadata:
  name: {{ include "anomaly-detector.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "anomaly-detector.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "anomaly-detector.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.containerPort }}
