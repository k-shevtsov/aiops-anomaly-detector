apiVersion: apps/v1
kind: Deployment
metadata:
  name: victim-service
  namespace: app
  labels:
    app: victim-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: victim-service
  template:
    metadata:
      labels:
        app: victim-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: victim-service
        image: victim-service:local
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
